  <text x="762" y="576" text-anchor="middle" font-size="10" font-weight="700" fill="white">GET /metrics</text>
  <text x="762" y="594" text-anchor="middle" font-size="9" fill="#0E7490">Prometheus exposition format</text>
  <text x="762" y="609" text-anchor="middle" font-size="9" fill="#64748B">prometheus-fastapi-instrumentator</text>

