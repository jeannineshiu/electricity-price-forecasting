  <text x="480" y="594" text-anchor="middle" font-size="9" fill="#0E7490">model_name · model_version</text>
  <text x="480" y="609" text-anchor="middle" font-size="9" fill="#64748B">model_alias: production</text>

  <!-- /metrics -->
  <rect x="672" y="562" width="180" height="56" rx="6" fill="white" stroke="#06B6D4" stroke-width="1.5"/>
