  <rect x="504" y="678" width="190" height="64" rx="6" fill="white" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="599" y="696" text-anchor="middle" font-size="11" font-weight="600" fill="#BE123C">Prometheus</text>
  <text x="599" y="711" text-anchor="middle" font-size="9" fill="#F43F5E">scrape_interval: 15s · port 9090</text>
  <text x="599" y="724" text-anchor="middle" font-size="9" fill="#F43F5E">http_requests_total</text>
  <text x="599" y="737" text-anchor="middle" font-size="9" fill="#F43F5E">http_request_duration_seconds</text>

  <!-- arrow Prometheus → Grafana -->
