  <!-- /predict -->
  <rect x="108" y="562" width="180" height="56" rx="6" fill="white" stroke="#06B6D4" stroke-width="1.5"/>
  <rect x="108" y="562" width="180" height="20" rx="6" fill="#0E7490"/>
  <text x="198" y="576" text-anchor="middle" font-size="10" font-weight="700" fill="white">POST /predict</text>
  <text x="198" y="594" text-anchor="middle" font-size="9" fill="#0E7490">12 features → EUR/MWh</text>
  <text x="198" y="609" text-anchor="middle" font-size="9" fill="#64748B">Pydantic validation · ModelStore.predict()</text>

  <!-- /health -->
  <rect x="390" y="562" width="180" height="56" rx="6" fill="white" stroke="#06B6D4" stroke-width="1.5"/>
  <rect x="390" y="562" width="180" height="20" rx="6" fill="#0E7490"/>
