  <!-- ═══════════════════════════════════════════════ -->
  <rect x="492" y="654" width="448" height="100" rx="8" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1.5"/>
  <text x="508" y="672" font-size="10" font-weight="700" fill="#BE123C" letter-spacing="1">OBSERVABILITY</text>

