  <line x1="310" y1="629" x2="255" y2="651" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="650" y1="629" x2="705" y2="651" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- metrics arrow to observability -->
  <line x1="762" y1="629" x2="762" y2="651" stroke="#F43F5E" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-red)"/>
  <text x="769" y="642" font-size="8" fill="#F43F5E">scrape</text>

