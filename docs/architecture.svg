  <text x="127" y="711" text-anchor="middle" font-size="9" fill="#64748B">Multi-stage build · python:3.11-slim</text>
  <text x="127" y="724" text-anchor="middle" font-size="9" fill="#64748B">libgomp1 · requirements-api.txt</text>
  <text x="127" y="737" text-anchor="middle" font-size="9" fill="#64748B">ghcr.io/jeannineshiu/...</text>

  <!-- Kubernetes -->
  <rect x="236" y="678" width="220" height="64" rx="6" fill="white" stroke="#64748B" stroke-width="1.5"/>
  <text x="346" y="696" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Kubernetes (minikube)</text>
  <text x="346" y="711" text-anchor="middle" font-size="9" fill="#64748B">Deployment · NodePort Service</text>
  <text x="346" y="724" text-anchor="middle" font-size="9" fill="#64748B">HPA: min 2 / max 5 replicas · CPU 70%</text>
  <text x="346" y="737" text-anchor="middle" font-size="9" fill="#64748B">liveness + readiness probes /health</text>

