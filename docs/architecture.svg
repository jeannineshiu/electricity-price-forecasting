  <text x="821" y="711" text-anchor="middle" font-size="9" fill="#F43F5E">port 3000 · PromQL data source</text>
  <text x="821" y="724" text-anchor="middle" font-size="9" fill="#F43F5E">Requests/sec · Latency P99</text>
  <text x="821" y="737" text-anchor="middle" font-size="9" fill="#F43F5E">Error rate · Total predict requests</text>

